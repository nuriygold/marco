{# Marco's nautical mark — a stylized cruise liner. Used in the sidebar and mobile drawer.
   Renders at whatever size the parent sets via width/height classes. #}
<svg viewBox="0 0 64 48" class="{{ logo_class|default('h-9 w-auto') }}" role="img" aria-label="Marco">
  <title>Marco</title>
  <!-- Waves -->
  <path d="M0 42 Q 8 39 16 42 T 32 42 T 48 42 T 64 42 L 64 48 L 0 48 Z"
        fill="#0ea5e9" opacity="0.35"/>
  <path d="M0 45 Q 10 43 20 45 T 40 45 T 64 45 L 64 48 L 0 48 Z"
        fill="#38bdf8" opacity="0.55"/>
  <!-- Hull -->
  <path d="M4 36 L 60 36 L 54 42 L 10 42 Z" fill="#0b1d3a" stroke="#c9a87c" stroke-width="0.75"/>
  <!-- Portholes -->
  <circle cx="14" cy="39" r="0.9" fill="#c9a87c"/>
  <circle cx="20" cy="39" r="0.9" fill="#c9a87c"/>
  <circle cx="26" cy="39" r="0.9" fill="#c9a87c"/>
  <circle cx="32" cy="39" r="0.9" fill="#c9a87c"/>
  <circle cx="38" cy="39" r="0.9" fill="#c9a87c"/>
  <circle cx="44" cy="39" r="0.9" fill="#c9a87c"/>
  <circle cx="50" cy="39" r="0.9" fill="#c9a87c"/>
  <!-- Main deck -->
  <rect x="8" y="28" width="48" height="8" fill="#dbeafe" stroke="#0b1d3a" stroke-width="0.6"/>
  <!-- Deck windows -->
  <rect x="12" y="30" width="3" height="3" fill="#38bdf8"/>
  <rect x="18" y="30" width="3" height="3" fill="#38bdf8"/>
  <rect x="24" y="30" width="3" height="3" fill="#38bdf8"/>
  <rect x="30" y="30" width="3" height="3" fill="#38bdf8"/>
  <rect x="36" y="30" width="3" height="3" fill="#38bdf8"/>
  <rect x="42" y="30" width="3" height="3" fill="#38bdf8"/>
  <rect x="48" y="30" width="3" height="3" fill="#38bdf8"/>
  <!-- Upper deck -->
  <rect x="14" y="22" width="36" height="6" fill="#f8fafc" stroke="#0b1d3a" stroke-width="0.5"/>
  <rect x="16" y="24" width="2" height="2" fill="#38bdf8"/>
  <rect x="20" y="24" width="2" height="2" fill="#38bdf8"/>
  <rect x="24" y="24" width="2" height="2" fill="#38bdf8"/>
  <rect x="28" y="24" width="2" height="2" fill="#38bdf8"/>
  <rect x="32" y="24" width="2" height="2" fill="#38bdf8"/>
  <rect x="36" y="24" width="2" height="2" fill="#38bdf8"/>
  <rect x="40" y="24" width="2" height="2" fill="#38bdf8"/>
  <rect x="44" y="24" width="2" height="2" fill="#38bdf8"/>
  <!-- Bridge -->
  <rect x="26" y="17" width="12" height="5" fill="#f8fafc" stroke="#0b1d3a" stroke-width="0.5"/>
  <!-- Funnels -->
  <rect x="22" y="9" width="4" height="10" fill="#c9a87c" stroke="#0b1d3a" stroke-width="0.5"/>
  <rect x="38" y="9" width="4" height="10" fill="#c9a87c" stroke="#0b1d3a" stroke-width="0.5"/>
  <rect x="22" y="9" width="4" height="2" fill="#0b1d3a"/>
  <rect x="38" y="9" width="4" height="2" fill="#0b1d3a"/>
  <!-- Mast + pennant -->
  <line x1="32" y1="17" x2="32" y2="4" stroke="#c9a87c" stroke-width="0.6"/>
  <path d="M32 5 L 40 7 L 32 9 Z" fill="#c9a87c"/>
</svg>
