{# Compact workspace switcher.
   The full "add workspace" form lives in the modal (components/workspace_add_modal.html),
   included once in base.html. #}
<div id="marco-workspace-switcher" class="mt-4 rounded-lg border border-slate-800 bg-slate-950 p-3">
  <div class="mb-2 text-[11px] uppercase tracking-wider text-slate-500">Workspace</div>
  {% if registry.workspaces %}
    <form hx-post="/api/workspaces/active"
          hx-ext="json-enc"
          hx-trigger="change from:select"
          hx-on::after-request="window.location.reload()"
          hx-swap="none">
      <select name="name"
              class="w-full rounded bg-slate-900 px-2 py-1 text-sm text-slate-100 outline-none ring-1 ring-slate-700 focus:ring-beacon">
        {% for ws in registry.workspaces %}
          <option value="{{ ws.name }}" {% if active and ws.name == active.name %}selected{% endif %}>
            {{ ws.name }}
          </option>
        {% endfor %}
      </select>
    </form>
    {% if active %}
      <p class="mt-1 truncate text-[10px] text-slate-500" title="{{ active.path }}">{{ active.path }}</p>
    {% endif %}
  {% else %}
    <p class="text-xs text-slate-400">No workspaces yet.</p>
  {% endif %}

  <button type="button"
          onclick="marcoWorkspaceModalOpen()"
          class="mt-2 flex w-full items-center justify-center gap-1 rounded bg-slate-800 px-2 py-1 text-[11px] text-slate-300 hover:bg-slate-700 hover:text-white">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3 w-3">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add workspace
  </button>
</div>
