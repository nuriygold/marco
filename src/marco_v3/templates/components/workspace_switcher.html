<div class="mt-4 rounded-lg border border-slate-800 bg-slate-950 p-3">
  <div class="mb-2 text-[11px] uppercase tracking-wider text-slate-500">Workspace</div>
  {% if registry.workspaces %}
    <form hx-post="/api/workspaces/active"
          hx-ext="json-enc"
          hx-trigger="change from:select"
          hx-on::after-request="window.location.reload()"
          hx-swap="none">
      <select name="name" class="w-full rounded bg-slate-900 px-2 py-1 text-sm text-slate-100 outline-none ring-1 ring-slate-700 focus:ring-emerald-500">
        {% for ws in registry.workspaces %}
          <option value="{{ ws.name }}" {% if active and ws.name == active.name %}selected{% endif %}>
            {{ ws.name }}
          </option>
        {% endfor %}
      </select>
    </form>
    {% if active %}
      <p class="mt-2 truncate text-[11px] text-slate-500" title="{{ active.path }}">{{ active.path }}</p>
    {% endif %}
  {% else %}
    <p class="text-xs text-slate-400">No workspaces yet.</p>
  {% endif %}

  <details class="mt-3">
    <summary class="cursor-pointer text-[11px] text-slate-400 hover:text-slate-200">Add workspace</summary>
    <form class="mt-2 space-y-2" onsubmit="return marcoAddWorkspace(event)">
      <input name="name" placeholder="name" required
             class="w-full rounded bg-slate-900 px-2 py-1 text-xs ring-1 ring-slate-700" />
      <input name="path" placeholder="/absolute/path" required
             class="w-full rounded bg-slate-900 px-2 py-1 text-xs ring-1 ring-slate-700" />
      <button class="w-full rounded bg-emerald-500/20 px-2 py-1 text-xs text-emerald-300 hover:bg-emerald-500/30">
        Register
      </button>
    </form>
  </details>
</div>
